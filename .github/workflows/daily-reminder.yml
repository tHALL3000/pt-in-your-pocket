name: Daily PT Reminder

on:
  schedule:
    # 10:00 AM US Central Time (16:00 UTC). Adjust UTC hour to change the time.
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install web-push @supabase/supabase-js

      - name: Fetch subscriptions and send push notifications
        run: |
          node -e "
          const webpush = require('web-push');
          const { createClient } = require('@supabase/supabase-js');

          const messages = [
            'Your exercises are waiting — like seeds ready to grow 🌿',
            'Time for today\\'s PT. You have got this, one movement at a time 🌸',
            'Your body is counting on you today. Just a few minutes of movement 🌱',
            'Daily reminder: you are healing, growing, getting stronger 🍃',
            'Today\\'s exercises are ready for you. You always feel better after 🌼',
          ];
          const message = messages[Math.floor(Math.random() * messages.length)];

          webpush.setVapidDetails(
            'mailto:${{ secrets.VAPID_EMAIL }}',
            '${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}',
            '${{ secrets.VAPID_PRIVATE_KEY }}'
          );

          const supabase = createClient(
            '${{ secrets.SUPABASE_URL }}',
            '${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}'
          );

          async function run() {
            const { data: subs } = await supabase
              .from('PtPushSubscription')
              .select('endpoint, p256dh, auth');

            if (!subs || subs.length === 0) {
              console.log('No subscriptions found.');
              return;
            }

            let sent = 0;
            for (const sub of subs) {
              try {
                await webpush.sendNotification(
                  { endpoint: sub.endpoint, keys: { p256dh: sub.p256dh, auth: sub.auth } },
                  JSON.stringify({ title: 'PT Companion 🌿', body: message, url: '/' })
                );
                sent++;
              } catch (e) {
                console.log('Removing expired subscription:', sub.endpoint);
                await supabase.from('PtPushSubscription').delete().eq('endpoint', sub.endpoint);
              }
            }
            console.log('Sent', sent, 'notifications.');
          }

          run().catch(console.error);
          "
        env:
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
